<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIMI ERP - Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; }
    header {
      background: #1a73e8;
      color: white;
      padding: 16px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 20px; }
    button.logout {
      background: transparent;
      border: 1px solid white;
      color: white;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
    }
    .container { padding: 30px; }
    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .card {
      background: white;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    .card h3 { color: #555; font-size: 14px; margin-bottom: 8px; }
    .card p { font-size: 32px; font-weight: bold; color: #1a73e8; }
  </style>
</head>
<body>
  <header>
    <h1>SIMI ERP</h1>
    <button class="logout" onclick="logout()">Cerrar sesión</button>
  </header>
  <div class="container">
    <div class="cards">
      <div class="card"><h3>Sucursales activas</h3><p>12</p></div>
      <div class="card"><h3>Productos en stock</h3><p>3.480</p></div>
      <div class="card"><h3>Ventas del día</h3><p>$842.500</p></div>
    </div>
  </div>
  <script>
    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/login.html';
    }
  </script>
</body>
</html>
